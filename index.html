<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Alicante Bus - Tiempo Real</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* Buscador superior */
        .search-container {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 400px;
        }
        #searchInput { 
            width: 100%; padding: 12px 15px; border-radius: 12px; border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 16px; outline: none;
        }

        /* Botón de Mi Ubicación */
        .geo-btn {
            position: fixed; top: 80px; right: 15px; z-index: 1000;
            background: white; border: none; width: 45px; height: 45px;
            border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;
        }

        /* Panel de información inferior */
        .info-panel { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; z-index: 1000;
            background: white; padding: 15px; border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3); text-align: center;
            max-height: 50vh; overflow-y: auto;
        }

        /* Tarjetas de autobús */
        .bus-card {
            display: flex; justify-content: space-between; align-items: center;
            background: #f8fafc; margin: 8px 0; padding: 12px;
            border-radius: 12px; border-left: 5px solid #2563eb;
        }
        .bus-line { font-weight: bold; font-size: 1.1em; color: #1e293b; }
        .bus-time { font-weight: bold; color: #d97706; font-size: 1.1em; }
        
        .tag { font-size: 0.7em; padding: 2px 6px; border-radius: 5px; margin-left: 5px; }
        .tag-live { background: #dcfce7; color: #166534; }
        .tag-plan { background: #f1f5f9; color: #475569; }

        hr { border: 0; border-top: 1px solid #e2e8f0; margin: 12px 0; }
        .loading { color: #64748b; font-style: italic; padding: 10px; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar parada o número..." onkeyup="ejecutarBusqueda()">
    </div>

    <button class="geo-btn" onclick="localizarUsuario()" title="Mi ubicación">📍</button>

    <div id="map"></div>

    <div id="info" class="info-panel">
        <strong>Bus Alicante</strong><br>
        <span style="color: #64748b; font-size: 0.9em;">Toca una parada o usa el buscador</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script>
        // --- CONFIGURACIÓN INICIAL ---
        const map = L.map('map', { zoomControl: false }).setView([38.345, -0.49], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const markers = L.markerClusterGroup();
        let databaseParadas = [];
        let databaseHorarios = {};
        let diccionarioMarcadores = {};

        // --- CARGA DE DATOS ---
        Promise.all([
            fetch('paradas.json').then(r => r.json()),
            fetch('horarios.json').then(r => r.json())
        ]).then(([paradas, horarios]) => {
            databaseParadas = paradas;
            databaseHorarios = horarios;

            paradas.forEach(p => {
                const marker = L.marker([p.lat, p.lon]);
                marker.on('click', () => abrirDetalleParada(p));
                markers.addLayer(marker);
                diccionarioMarcadores[p.id] = marker;
            });
            map.addLayer(markers);
        }).catch(err => {
            console.error("Error al cargar archivos JSON:", err);
            document.getElementById('info').innerHTML = "Error al cargar datos. Verifica paradas.json y horarios.json";
        });

        // --- FUNCIONES DE INTERFAZ ---
        function abrirDetalleParada(p) {
            document.getElementById('info').innerHTML = `
                <div style="font-weight: bold; font-size: 1.1em;">${p.n}</div>
                <div style="color: #64748b; font-size: 0.85em;">Parada Nº ${p.id}</div>
                <hr>
                <div id="listadoTiempos" class="loading">Consultando tiempo real...</div>
            `;
            map.panTo([p.lat, p.lon]);
            consultarTiemposVectalia(p.id);
        }

        function ejecutarBusqueda() {
            const texto = document.getElementById('searchInput').value.toLowerCase();
            if (texto.length < 2) return;

            const encontrada = databaseParadas.find(p => 
                p.id.includes(texto) || p.n.toLowerCase().includes(texto)
            );

            if (encontrada) {
                const m = diccionarioMarcadores[encontrada.id];
                markers.zoomToShowLayer(m, () => {
                    m.fire('click');
                });
            }
        }

        function localizarUsuario() {
            map.locate({setView: true, maxZoom: 16});
        }

        map.on('locationfound', (e) => {
            L.circle(e.latlng, e.accuracy).addTo(map);
            L.marker(e.latlng).addTo(map).bindPopup("Estás aquí").openPopup();
        });

        // --- LÓGICA DE TIEMPOS (REAL VS PROGRAMADO) ---
        async function consultarTiemposVectalia(stopId) {
            const container = document.getElementById('listadoTiempos');
            const apiURL = `https://api.vectalia.es/v1/alicante/stops/${stopId}/estimations`;
            const proxyURL = `https://api.allorigins.win/get?url=${encodeURIComponent(apiURL)}`;

            try {
                const response = await fetch(proxyURL);
                const json = await response.json();
                const data = JSON.parse(json.contents);

                if (Array.isArray(data) && data.length > 0) {
                    let html = "";
                    data.forEach(bus => {
                        const linea = bus.linea || bus.line || "??";
                        html += `
                            <div class="bus-card">
                                <span class="bus-line">🚍 L${linea} <span class="tag tag-live">Vivo</span></span>
                                <span class="bus-time">${bus.minutos} min</span>
                            </div>`;
                    });
                    container.innerHTML = html;
                } else {
                    mostrarRespaldoOffline(stopId, "Sin datos en tiempo real");
                }
            } catch (error) {
                mostrarRespaldoOffline(stopId, "Modo Horario Oficial");
            }
        }

        function mostrarRespaldoOffline(stopId, motivo) {
            const container = document.getElementById('listadoTiempos');
            const ahora = new Date();
            const horaActual = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');
            
            const misHorarios = databaseHorarios[stopId] || [];
            // Filtramos las próximas 3 horas programadas
            const proximos = misHorarios.filter(item => item.h > horaActual).slice(0, 3);

            let html = `<div style="font-size:0.75em; color:#64748b; margin-bottom:8px;">${motivo}</div>`;
            
            if (proximos.length > 0) {
                proximos.forEach(item => {
                    html += `
                        <div class="bus-card" style="opacity:0.8; border-left-color: #94a3b8;">
                            <span class="bus-line">📅 L${item.l} <span class="tag tag-plan">Plan</span></span>
                            <span class="bus-time">${item.h}</span>
                        </div>`;
                });
            } else {
                html += "No hay más buses programados para hoy.";
            }
            container.innerHTML = html;
        }
    </script>
</body>
</html>
