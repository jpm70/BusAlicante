<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Alicante Bus Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }

        /* Buscador superior */
        .search-box {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 400px;
            display: flex; gap: 5px;
        }
        input { 
            flex-grow: 1; padding: 12px; border-radius: 10px; 
            border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Botón ubicación */
        .loc-btn {
            position: fixed; top: 70px; right: 10px; z-index: 1000;
            background: white; border: none; padding: 10px; border-radius: 50%;
            width: 45px; height: 45px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 20px;
        }

        /* Panel info */
        .info-panel { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; z-index: 1000;
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); text-align: center;
        }
        .bus-card {
            display: flex; justify-content: space-between;
            background: #f1f5f9; margin: 5px 0; padding: 10px;
            border-radius: 8px; font-weight: bold; border-left: 4px solid #2563eb;
        }
        .time { color: #d97706; }
    </style>
</head>
<body>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Escribe nº de parada o nombre..." onkeyup="buscarParada()">
</div>

<button class="loc-btn" onclick="miUbicacion()">📍</button>

<div id="map"></div>
<div id="info" class="info-panel">Toca una parada o busca su número</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    const map = L.map('map', { zoomControl: false }).setView([38.345, -0.49], 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    const markers = L.markerClusterGroup(); // Grupo para agrupar puntos
    let listaParadas = [];
    let baseHorarios = {};
    let marcadoresPorId = {};

    // Carga de datos
    Promise.all([
        fetch('paradas.json').then(r => r.json()),
        fetch('horarios.json').then(r => r.json())
    ]).then(([paradas, horarios]) => {
        listaParadas = paradas;
        baseHorarios = horarios;

        paradas.forEach(p => {
            const marker = L.marker([p.lat, p.lon]);
            marker.on('click', () => abrirParada(p));
            markers.addLayer(marker);
            marcadoresPorId[p.id] = marker; // Guardamos referencia para el buscador
        });
        map.addLayer(markers);
    });

    function abrirParada(p) {
        document.getElementById('info').innerHTML = `
            <strong>${p.n}</strong><br><small>ID: ${p.id}</small><hr>
            <div id="tiempos">Cargando...</div>
        `;
        obtenerTiempos(p.id);
        map.panTo([p.lat, p.lon]);
    }

    // BUSCADOR
    function buscarParada() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const paradaencontrada = listaParadas.find(p => p.id.includes(query) || p.n.toLowerCase().includes(query));
        
        if (paradaencontrada && query.length > 2) {
            const m = marcadoresPorId[paradaencontrada.id];
            markers.zoomToShowLayer(m, () => {
                m.fire('click');
            });
        }
    }

    // MI UBICACIÓN
    function miUbicacion() {
        map.locate({setView: true, maxZoom: 16});
    }

    map.on('locationfound', (e) => {
        L.circle(e.latlng, e.accuracy).addTo(map);
        L.marker(e.latlng).addTo(map).bindPopup("Estás aquí").openPopup();
    });

    // TIEMPO REAL (con respaldo offline)
    async function obtenerTiempos(id) {
        const div = document.getElementById('tiempos');
        const api = `https://api.vectalia.es/v1/alicante/stops/${id}/estimations`;
        const proxy = "https://api.allorigins.win/get?url=";

        try {
            const r = await fetch(proxy + encodeURIComponent(api));
            const json = await r.json();
            const data = JSON.parse(json.contents);
            
            if (data && data.length > 0) {
                let h = "";
                data.forEach(b => {
                    h += `<div class="bus-card"><span>🚍 L${b.linea}</span><span class="time">${b.minutos} min</span></div>`;
                });
                div.innerHTML = h;
            } else {
                mostrarBackup(id);
            }
        } catch (e) {
            mostrarBackup(id);
        }
    }

    function mostrarBackup(id) {
        const ahora = new Date().getHours().toString().padStart(2, '0') + ":" + new Date().getMinutes().toString().padStart(2, '0');
        const hores = (baseHorarios[id] || []).filter(h => h > ahora).slice(0, 3);
        let html = "<small style='color:gray'>Modo Horario Oficial</small>";
        hores.forEach(h => html += `<div class="bus-card" style="opacity:0.7"><span>📅 Plan</span><span>${h}</span></div>`);
        document.getElementById('tiempos').innerHTML = html || "No hay más buses hoy.";
    }
</script>
</body>
</html>
