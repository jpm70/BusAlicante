<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Alicante Live - Mi App</title>
    
    <!-- Leaflet CSS para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Estilos básicos para que ocupe toda la pantalla */
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* Panel de información inferior */
        .info-panel { 
            position: fixed; 
            bottom: 25px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 85%; 
            max-width: 450px; 
            z-index: 1000;
            background: white; 
            padding: 20px; 
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            text-align: center;
        }

        .linea-bus {
            background: #f0f4f8;
            margin: 5px 0;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .minutos { color: #e67e22; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="info" class="info-panel">
        <strong>Bus Alicante Live</strong><br>
        Toca cualquier parada azul en el mapa.
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Configuración del Mapa (Centro inicial en Alicante)
        const map = L.map('map').setView([38.345, -0.49], 14);

        // 2. Capa visual del mapa (CartoDB para evitar errores 403)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. Carga masiva de paradas desde tu paradas.json
        fetch('paradas.json')
            .then(response => response.json())
            .then(paradas => {
                paradas.forEach(p => {
                    // Marcador basado en stop_lat y stop_lon de tu archivo
                    const marker = L.marker([p.lat, p.lon]).addTo(map);
                    
                    marker.on('click', () => {
                        // Mostramos stop_name (p.n) y stop_id (p.id)
                        document.getElementById('info').innerHTML = `
                            <div style="font-size: 1.1em; margin-bottom: 5px;"><strong>${p.n}</strong></div>
                            <small style="color: #666;">ID de parada: ${p.id}</small>
                            <hr>
                            <div id="tiempos">Cargando tiempos...</div>
                        `;
                        obtenerTiempos(p.id);
                    });
                });
            })
            .catch(err => {
                console.error("No se pudo cargar paradas.json", err);
                document.getElementById('info').innerHTML = "Error: No se encuentra paradas.json";
            });

        // 4. Función para consultar la API de Vectalia
        async function obtenerTiempos(stopId) {
            const container = document.getElementById('tiempos');
            const apiTarget = `https://api.vectalia.es/v1/alicante/stops/${stopId}/estimations`;
            
            // Usamos AllOrigins para saltar el bloqueo CORS
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiTarget)}`;

            try {
                const response = await fetch(proxyUrl);
                const result = await response.json();
                
                // AllOrigins devuelve el JSON dentro de 'contents' como texto
                const data = JSON.parse(result.contents);
                
                if (data && data.length > 0) {
                    let html = "";
                    data.forEach(bus => {
                        html += `
                            <div class="linea-bus">
                                <span>🚍 Línea ${bus.linea}</span>
                                <span class="minutos">${bus.minutos} min</span>
                            </div>`;
                    });
                    container.innerHTML = html;
                } else {
                    container.innerHTML = "No hay información de buses ahora mismo.";
                }
            } catch (error) {
                container.innerHTML = "<span style='color:red;'>Error de conexión con la red de buses.</span>";
                console.error("Error API:", error);
            }
        }
    </script>
</body>
</html>
