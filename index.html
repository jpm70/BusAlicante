<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Alicante Bus Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info-panel { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; z-index: 1000;
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); text-align: center;
        }
        .bus-item {
            background: #f1f5f9; margin: 5px 0; padding: 10px;
            border-radius: 10px; display: flex; justify-content: space-between;
            font-weight: bold; border-left: 5px solid #0052cc;
        }
        .time { color: #d97706; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="info" class="info-panel">Toca cualquier parada para ver el tiempo real</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([38.345, -0.49], 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    // Cargamos TODAS las paradas del JSON
    fetch('paradas.json')
        .then(res => res.json())
        .then(paradas => {
            paradas.forEach(p => {
                const marker = L.marker([p.lat, p.lon]).addTo(map);
                marker.on('click', () => {
                    document.getElementById('info').innerHTML = `
                        <strong>${p.n}</strong><br>
                        <small>ID: ${p.id}</small><hr>
                        <div id="tiempos">Consultando...</div>
                    `;
                    obtenerTiempos(p.id);
                });
            });
        });

    async function obtenerTiempos(id) {
        const div = document.getElementById('tiempos');
        const api = `https://api.vectalia.es/v1/alicante/stops/${id}/estimations`;
        
        // Proxy alternativo: Thingproxy (muy estable para APIs sencillas)
        const proxy = "https://thingproxy.freeboard.io/fetch/";

        try {
            const r = await fetch(proxy + api);
            const data = await r.json();
            
            if (data && data.length > 0) {
                let h = "";
                data.forEach(b => {
                    h += `<div class="bus-item"><span>🚍 L${b.linea}</span><span class="time">${b.minutos} min</span></div>`;
                });
                div.innerHTML = h;
            } else {
                div.innerHTML = "Sin buses en los próximos 30 min.";
            }
        } catch (e) {
            div.innerHTML = "<span style='color:red'>Error de red. Intenta pulsar de nuevo.</span>";
        }
    }
</script>
</body>
</html>
